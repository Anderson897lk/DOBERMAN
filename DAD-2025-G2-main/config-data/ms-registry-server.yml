server:
  port: 8090

spring:
  application:
    name: ms-registry-server
  # Forzamos la desactivación de perfiles que puedan exponer rutas vulnerables
  profiles:
    active: default

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  instance:
    hostname: localhost
    # Mitigación: Definir rutas explícitas para evitar el bypass por rutas alternativas
    status-page-url-path: /actuator/info
    health-check-url-path: /actuator/health

management:
  endpoints:
    web:
      exposure:
        # CORRECCIÓN CRÍTICA: Solo exponemos lo mínimo necesario. 
        # Esto elimina la posibilidad de explotación del bypass.
        include: "health,info"
  endpoint:
    health:
      # No mostrar detalles previene la filtración de información sensible (CVSS 9.2)
      show-details: never
      # Desactivamos grupos personalizados que Snyk marca como vulnerables
      probes:
        enabled: false
