server:
  port: 8090

spring:
  application:
    name: ms-registry-server

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8090/eureka
  instance:
    hostname: localhost
    # Definimos rutas fijas para evitar accesos por canales alternativos
    status-page-url-path: /actuator/info
    health-check-url-path: /actuator/health

management:
  endpoints:
    web:
      exposure:
        # MITIGACIÓN: Solo exponemos health e info. 
        # Esto elimina el vector de ataque del Bypass (CVE-2026-22731).
        include: "health,info"
  endpoint:
    health:
      show-details: never
      # Desactivamos grupos de salud personalizados para limpiar la alerta de Snyk
      probes:
        enabled: false
